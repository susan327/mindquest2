{% extends "base.html" %}

{% block content %}
<div class="kai-container">
  <h2>🧘‍♀️ あなたの快（実行回数つき）</h2>

  <div class="kai-analysis-action">
    <a href="/kai_analyze" class="analyze-btn">🧠 AI分析する</a>
  </div>

  {% if analysis %}
    <div class="analysis-box">
      <h3>🧠 あなたの快分析</h3>
      <pre>{{ analysis }}</pre>
    </div>
  {% endif %}

  {% if analysis_logs %}
    <div class="analysis-history">
      <button
        type="button"
        id="analysisHistoryTitleBtn"
        class="analysis-history-title"
        onclick="toggleHistoryList()"
      >
        📚 快分析履歴を開く
      </button>

      <div id="analysisHistoryList" class="analysis-history-list">
        {% for log in analysis_logs %}
          <div class="history-item">
            <div class="history-row">
              <button
                type="button"
                class="history-toggle"
                data-open-label="{{ log.created_at|jst('%Y-%m-%d %H:%M') }} の履歴を開く"
                data-close-label="{{ log.created_at|jst('%Y-%m-%d %H:%M') }} の履歴を閉じる"
                onclick="toggleHistory('history-{{ log.id }}', this)"
              >
                {{ log.created_at|jst("%Y-%m-%d %H:%M") }} の履歴を開く
              </button>

              <form
                method="POST"
                action="{{ url_for('kai_analysis_delete', log_id=log.id) }}"
                class="history-delete-form"
                onsubmit="return confirm('この快分析履歴を削除しますか？');"
              >
                <button type="submit" class="history-delete-btn">削除</button>
              </form>
            </div>

            <div id="history-{{ log.id }}" class="history-content">
              <pre>{{ log.analysis_text }}</pre>
            </div>
          </div>
        {% endfor %}
      </div>
    </div>
  {% endif %}

  <div class="kai-sort-row">
    <label for="kaiSort">並び替え：</label>
    <select id="kaiSort" onchange="renderKaiList()">
      <option value="date_new">更新が新しい順</option>
      <option value="date_old">更新が古い順</option>
      <option value="count_desc">多い順</option>
      <option value="count_asc">少ない順</option>
    </select>
  </div>

  <ul class="kai-list" id="kaiList">
    <li>読み込み中...</li>
  </ul>

  <h3>＋ 快を追加する</h3>
  <div class="kai-add-row">
    <input type="text" id="customKaiInput" placeholder="自由に快を入力..." />
    <button class="btn-primary" onclick="submitCustomKai()">登録</button>
  </div>
</div>

<div id="kaiModal">
  <p id="kaiConfirmText">この行動を快として登録しますか？</p>
  <button class="btn-primary" onclick="submitKai()">はい</button>
  <button class="btn-kai-delete" onclick="closeModal()">キャンセル</button>
</div>

<script>
  let selectedKai = "";
  let kaiLogs = [];

  function toggleHistoryList() {
    const list = document.getElementById("analysisHistoryList");
    const button = document.getElementById("analysisHistoryTitleBtn");
    if (!list || !button) return;

    const isOpen = list.style.display === "block";
    list.style.display = isOpen ? "none" : "block";
    button.textContent = isOpen
      ? "📚 快分析履歴を開く"
      : "📚 快分析履歴を閉じる";
  }

  function toggleHistory(id, button) {
    const target = document.getElementById(id);
    if (!target) return;

    const isOpen = target.style.display === "block";
    target.style.display = isOpen ? "none" : "block";

    if (button) {
      button.textContent = isOpen
        ? (button.dataset.openLabel || "履歴を開く")
        : (button.dataset.closeLabel || "履歴を閉じる");
    }
  }

  function escapeForJsSingleQuote(value) {
    return String(value)
      .replace(/\\/g, "\\\\")
      .replace(/'/g, "\\'")
      .replace(/\n/g, "\\n")
      .replace(/\r/g, "\\r");
  }

  function confirmKai(kai) {
    selectedKai = kai;
    document.getElementById("kaiConfirmText").innerText =
      `「${kai}」を快として登録しますか？`;
    document.getElementById("kaiModal").style.display = "block";
  }

  function closeModal() {
    document.getElementById("kaiModal").style.display = "none";
    selectedKai = "";
  }

  function submitKai() {
    fetch("/register_kai", {
      method: "POST",
      body: JSON.stringify({ kai: selectedKai }),
      headers: { "Content-Type": "application/json" },
    }).then(() => {
      alert("登録しました！");
      closeModal();
      location.reload();
    });
  }

  function deleteKai(kai) {
    if (confirm(`本当に「${kai}」を削除しますか？`)) {
      fetch("/delete_kai", {
        method: "POST",
        body: JSON.stringify({ kai }),
        headers: { "Content-Type": "application/json" },
      }).then(() => {
        alert("削除しました");
        location.reload();
      });
    }
  }

  function submitCustomKai() {
    const input = document.getElementById("customKaiInput");
    const kai = input.value.trim();
    if (!kai) {
      alert("快を入力してください！");
      return;
    }

    fetch("/register_kai", {
      method: "POST",
      body: JSON.stringify({ kai }),
      headers: { "Content-Type": "application/json" },
    }).then(() => {
      alert("登録しました！");
      input.value = "";
      location.reload();
    });
  }

  function formatKaiDate(isoString) {
    if (!isoString) return "";
    const d = new Date(isoString);
    if (isNaN(d.getTime())) return "";

    const yyyy = d.getFullYear();
    const mm = String(d.getMonth() + 1).padStart(2, "0");
    const dd = String(d.getDate()).padStart(2, "0");
    const hh = String(d.getHours()).padStart(2, "0");
    const mi = String(d.getMinutes()).padStart(2, "0");

    return `${yyyy}-${mm}-${dd} ${hh}:${mi}`;
  }

  function renderKaiList() {
    const ul = document.getElementById("kaiList");
    const modeSelect = document.getElementById("kaiSort");
    const mode = modeSelect ? modeSelect.value : "date_new";

    if (!kaiLogs || kaiLogs.length === 0) {
      ul.innerHTML = "<li>まだ快が登録されていません</li>";
      return;
    }

    const sorted = [...kaiLogs];

    sorted.sort((a, b) => {
      const aCount = a.count || 0;
      const bCount = b.count || 0;
      const aTime = a.created_at ? new Date(a.created_at).getTime() : 0;
      const bTime = b.created_at ? new Date(b.created_at).getTime() : 0;

      switch (mode) {
        case "count_desc":
          return bCount - aCount;
        case "count_asc":
          return aCount - bCount;
        case "date_old":
          return aTime - bTime;
        case "date_new":
        default:
          return bTime - aTime;
      }
    });

    ul.innerHTML = "";
    sorted.forEach(log => {
      const li = document.createElement("li");
      li.className = "kai-item";

      const dateText = formatKaiDate(log.created_at);
      const metaText = dateText
        ? `（${log.count}回／最終追加：${dateText}）`
        : `（${log.count}回）`;

      const safeName = escapeForJsSingleQuote(log.name);

      li.innerHTML = `
        <div class="kai-main">
          <div class="kai-title">🌟 ${log.name}</div>
          <div class="kai-meta">${metaText}</div>
        </div>
        <div class="kai-actions">
          <button class="btn-kai-delete" onclick="deleteKai('${safeName}')">
            削除
          </button>
        </div>
      `;
      ul.appendChild(li);
    });
  }

  window.addEventListener("load", () => {
    fetch("/api/kai_status")
      .then(res => res.json())
      .then(data => {
        if (!data.ok) {
          throw new Error("APIエラー");
        }
        kaiLogs = data.logs || [];
        renderKaiList();
      })
      .catch(err => {
        console.error("快一覧取得エラー:", err);
        document.getElementById("kaiList").innerHTML =
          "<li>快一覧の取得に失敗しました</li>";
      });
  });
</script>
{% endblock %}
