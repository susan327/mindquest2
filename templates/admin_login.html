{% extends "base.html" %}

{% block content %}
<div class="container">
  <h2>🔐 管理者ログイン</h2>

  <form method="POST" action="{{ url_for('admin_login') }}">
    <input type="hidden" name="next" value="{{ next_url or url_for('admin_quests') }}">

    <label for="password">管理者パスワード</label>
    <input
      type="password"
      id="password"
      name="password"
      required
      autocomplete="current-password"
      placeholder="管理者パスワードを入力"
    >

    <button type="submit">ログイン</button>
  </form>
</div>
{% endblock %}
